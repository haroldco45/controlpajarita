<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Retroexcavadora Pajarita</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta name="theme-color" content="#f59e0b">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen pb-12">

    <header class="bg-amber-500 text-slate-950 p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-bold tracking-tight">Control Pajarita 🚜</h1>
            <p class="text-xs font-semibold opacity-85">Gestión de Maquinaria Pesada</p>
        </div>
        <div id="connection-status" class="bg-emerald-600 text-white text-xs px-3 py-1.5 rounded-full font-bold flex items-center gap-1.5 shadow-sm">
            <span class="w-2 h-2 rounded-full bg-white animate-pulse"></span>
            En Línea
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <section class="grid grid-cols-2 gap-4">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md">
                <span class="text-xs text-slate-400 block mb-1">Último Horómetro</span>
                <span id="stat-horometro" class="text-2xl font-black text-amber-400">0.0 hrs</span>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md">
                <span class="text-xs text-slate-400 block mb-1">Próx. Mantenimiento</span>
                <span id="stat-mantenimiento" class="text-sm font-bold text-emerald-400 block mt-1">Revisando...</span>
            </div>
        </section>

        <section class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-amber-400 border-b border-slate-700 pb-2">
                📝 Registrar Jornada Diaria
            </h2>
            <form id="form-registro" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Fecha</label>
                    <input type="date" id="input-fecha" required class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Operador a Cargo</label>
                    <input type="text" id="input-operador" placeholder="Ej. Juan Pérez" required class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-amber-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Horómetro Inicial</label>
                        <input type="number" step="0.1" id="input-h-inicial" placeholder="0.0" required class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-amber-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Horómetro Final</label>
                        <input type="number" step="0.1" id="input-h-final" placeholder="0.0" required class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-amber-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Combustible Suministrado (Galones)</label>
                    <input type="number" step="0.1" id="input-combustible" placeholder="0 si no tanqueó" required class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Notas u Observaciones Novedades</label>
                    <textarea id="input-notas" placeholder="Ej. Fuga leve en cilindro de balde, terreno rocoso..." rows="2" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-amber-500"></textarea>
                </div>
                <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold p-3 rounded-lg transition-colors cursor-pointer shadow-lg active:scale-[0.99]">
                    Guardar Registro Local
                </button>
            </form>
        </section>

        <section class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl">
            <h2 class="text-lg font-bold mb-3 text-slate-300">Historial Reciente (Offline local)</h2>
            <div id="lista-registros" class="space-y-3 max-h-60 overflow-y-auto pr-1">
                <p class="text-sm text-slate-500 italic text-center py-4">No hay registros guardados en este dispositivo.</p>
            </div>
        </section>
    </main>

    <footer class="text-center text-xs text-slate-500 py-6 border-t border-slate-800 mt-12 bg-slate-950/50">
        <p>&copy; 2026 Vibras Positivas. Todos los derechos reservados.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
